<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gonna be Golden ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fff9e6 0%, #ffccd5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px; /* Reducimos un poco el padding para que quepa la foto */
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 184, 0, 0.2);
            text-align: center;
            max-width: 350px;
            border: 2px solid #ffd700;
            z-index: 1; /* Asegura que la tarjeta esté sobre el confeti inicial */
        }

        h1 { color: #d4af37; margin-bottom: 5px; font-size: 1.8rem; margin-top: 10px; }
        p { color: #666; margin-top: 5px; }

        .corazon {
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
            filter: drop-shadow(0 0 10px #ffd700);
        }

        .corazon:hover { transform: scale(1.2) rotate(5deg); }

        /* --- ESTILOS DE LA IMAGEN --- */
        .imagen-sorpresa {
            width: 100%; /* Ocupa todo el ancho disponible de la tarjeta */
            max-width: 280px; /* Pero no más de esto */
            height: auto; /* Mantiene la proporción */
            border-radius: 20px; /* Bordes redondeados */
            border: 3px solid #fff9e6; /* Un borde interno sutil */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Sombra suave */
            margin-top: 15px;
            margin-bottom: 10px;
            /* La imagen empieza oculta y aparece con el mensaje */
            display: none; 
            animation: fadeIn 2s ease;
        }

        button {
            background: linear-gradient(45deg, #ffd700, #ff4d6d);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.5);
        }

        #contenido-secreto {
            display: none; /* Oculta todo el contenido final al principio */
        }

        #mensaje-secreto {
            margin-top: 20px;
            color: #b8860b;
            font-weight: bold;
            font-size: 1.3rem;
            line-height: 1.5;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="golden.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <div class="corazon" onclick="lanzarConfeti()">✨💛✨</div>
        <h1>Para mi persona favorita</h1>
        
        <img src="Hornett y Holow.jpeg" alt="Nuestra foto especial" id="foto" class="imagen-sorpresa">

        <p id="texto-previa">Tengo una pequeña sorpresa para ti. Sube el volumen...</p>
        
        <button id="btn-accion" onclick="revelarTodo()">Presiona aquí</button>

        <div id="contenido-secreto">
            <div id="mensaje-secreto">
                ¡Eres increíble y nunca dejes de creer en ti! <br> 
                ✨ TE AMO ABRAHAM ✨ <br>
                <small style="font-size: 0.8rem; font-weight: normal;">Gonna be golden!</small>
            </div>
        </div>
    </div>

    <script>
        const musica = document.getElementById('musica');
        const foto = document.getElementById('foto');
        const contenidoSecreto = document.getElementById('contenido-secreto');
        const btnAccion = document.getElementById('btn-accion');
        const textoPrevia = document.getElementById('texto-previa');

        function lanzarConfeti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#ff4d6d', '#ffffff', '#ffccd5']
            });
        }

        function revelarTodo() {
            // 1. Mostramos la foto y el mensaje
            foto.style.display = 'block';
            contenidoSecreto.style.display = 'block';
            
            // 2. Ocultamos el botón y el texto previo
            btnAccion.style.display = 'none';
            textoPrevia.style.display = 'none';
            
            // 3. Lanzamos ráfagas de confeti dorado
            lanzarConfeti();
            setTimeout(lanzarConfeti, 500);
            setTimeout(lanzarConfeti, 1000);
            
            // 4. Reproducir "Golden"
            musica.play().catch(error => console.log("El navegador bloqueó el audio:", error));
        }
    </script>

</body>
</html>
